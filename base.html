<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bus Ticket Booking System</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="{{ url_for('customer.index') }}">Bus Booking</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        {% if session.get('role') == 'admin' %}
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('admin.dashboard') }}">Admin</a>
        </li>
        {% endif %}

        {% if session.get('user_id') %}
        <li class="nav-item">
          <span class="navbar-text me-3">Hello, {{ session.get('user_name') }}</span>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('customer.my_bookings') }}">My Bookings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('customer.logout') }}">Logout</a>
        </li>
        {% else %}
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('customer.login') }}">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('customer.register') }}">Register</a>
        </li>
        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<div class="container page-wrapper">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
